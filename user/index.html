<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <script>
        const u = new URLSearchParams(window.location.search).get('u');
        const dest = '../profile/' + (u ? '?u=' + encodeURIComponent(u) : '');
        window.location.replace(dest);
    </script>
</head>
<body></body>
</html>
